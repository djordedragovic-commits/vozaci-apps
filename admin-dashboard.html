<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Admin Dashboard</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background: linear-gradient(to right, #8e44ad, #3498db);\n            color: #fff;\n            padding: 20px;\n        }\n        table {\n            width: 100%;\n            border-collapse: collapse;\n        }\n        th, td {\n            padding: 10px;\n            text-align: left;\n            border-bottom: 1px solid #ddd;\n        }\n        th {\n            background-color: #5e6e8c;\n        }\n    </style>\n    <script src='https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js'></script>\n    <script src='https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js'></script>\n    <script src='https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js'></script>\n</head>\n<body>\n    <h1>Admin Dashboard</h1>\n    <div id='auth'>\n        <h2>Login / Signup</h2>\n        <input type='email' id='email' placeholder='Email' required>\n        <input type='password' id='password' placeholder='Password' required>\n        <button id='loginBtn'>Login</button>\n        <button id='signupBtn'>Signup</button>\n        <p id='status'></p>\n    </div>\n    <div id='data'>\n        <h2>Records</h2>\n        <table id='recordsTable'>\n            <thead>\n                <tr>\n                    <th>ID</th>\n                    <th>Name</th>\n                    <th>Hours</th>\n                    <th>Action</th>\n                </tr>\n            </thead>\n            <tbody></tbody>\n        </table>\n        <p>Total Records: <span id='totalRecords'>0</span></p>\n        <p>Nemanja Hours: <span id='nemanjaHours'>0</span></p>\n        <p>Dejan Hours: <span id='dejanHours'>0</span></p>\n    </div>\n    <script>\n        const firebaseConfig = {\n            // Your Firebase configuration here\n        };\n        const app = firebase.initializeApp(firebaseConfig);\n        const auth = firebase.auth();\n        const database = firebase.database();\n\n        document.getElementById('loginBtn').addEventListener('click', () => {\n            const email = document.getElementById('email').value;\n            const password = document.getElementById('password').value;\n            auth.signInWithEmailAndPassword(email, password)\n                .then(() => {\n                    document.getElementById('status').innerText = 'Login successful';\n                    loadRecords();\n                })\n                .catch(error => {\n                    document.getElementById('status').innerText = error.message;\n                });\n        });\n\n        document.getElementById('signupBtn').addEventListener('click', () => {\n            const email = document.getElementById('email').value;\n            const password = document.getElementById('password').value;\n            auth.createUserWithEmailAndPassword(email, password)\n                .then(() => {\n                    document.getElementById('status').innerText = 'Signup successful';\n                })\n                .catch(error => {\n                    document.getElementById('status').innerText = error.message;\n                });\n        });\n\n        function loadRecords() {\n            database.ref('records').on('value', (snapshot) => {\n                const records = snapshot.val();\n                const tbody = document.querySelector('#recordsTable tbody');\n                tbody.innerHTML = '';\n                let total = 0;\n                let nemanjaHours = 0;\n                let dejanHours = 0;\n                for (const id in records) {\n                    const record = records[id];\n                    const row = tbody.insertRow();\n                    row.insertCell(0).innerText = id;\n                    row.insertCell(1).innerText = record.name;\n                    row.insertCell(2).innerText = record.hours;\n                    total++;\n                    nemanjaHours += record.nemanja || 0;\n                    dejanHours += record.dejan || 0;\n                    const deleteCell = row.insertCell(3);\n                    deleteCell.innerHTML = '<button onclick=\"deleteRecord(\'' + id + '\')\">Delete</button>';\n                }\n                document.getElementById('totalRecords').innerText = total;\n                document.getElementById('nemanjaHours').innerText = nemanjaHours;\n                document.getElementById('dejanHours').innerText = dejanHours;\n            });\n        }\n\n        function deleteRecord(id) {\n            database.ref('records/' + id).remove();\n        }\n    </script>\n</body>\n</html>\n
