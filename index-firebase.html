<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Vozači App - Firebase Integration</title>\n    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>\n    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        table { width: 100%; border-collapse: collapse; margin-top: 20px; }\n        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }\n        th { cursor: pointer; background-color: #f0f0f0; }\n    </style>\n</head>\n<body>\n    <h1>Vozači Entry Records</h1>\n    <label for="vozač">Select Vozač:</label>\n    <select id="vozač">\n        <option value="Nemanja">Nemanja</option>\n        <option value="Dejan">Dejan</option>\n    </select>\n    <br><br>\n    <label for="ulazak">Ulazak:</label>\n    <input type="datetime-local" id="ulazak">\n    <label for="izlazak">Izlazak:</label>\n    <input type="datetime-local" id="izlazak">\n    <button onclick="addRecord()">Add Record</button>\n    <table>\n        <thead>\n            <tr>\n                <th onclick="sortTable(0)">Vozač</th>\n                <th onclick="sortTable(1)">Ulazak</th>\n                <th onclick="sortTable(2)">Izlazak</th>\n                <th onclick="sortTable(3)">Sati</th>\n                <th onclick="sortTable(4)">Dani</th>\n            </tr>\n        </thead>\n        <tbody id="records-table">\n        </tbody>\n    </table>\n    <script>\n        // Firebase Configuration \n        const firebaseConfig = {\n            apiKey: "YOUR_API_KEY",\n            authDomain: "YOUR_AUTH_DOMAIN",\n            databaseURL: "YOUR_DATABASE_URL",\n            projectId: "YOUR_PROJECT_ID",\n            storageBucket: "YOUR_STORAGE_BUCKET",\n            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",\n            appId: "YOUR_APP_ID"\n        };\n        firebase.initializeApp(firebaseConfig);\n        const database = firebase.database();\n\n        function addRecord() {\n            const vozač = document.getElementById('vozač').value;\n            const ulazak = document.getElementById('ulazak').value;\n            const izlazak = document.getElementById('izlazak').value;\n\n            const record = { vozač, ulazak, izlazak };\n            database.ref('records/').push(record);\n        }\n\n        database.ref('records/').on('value', (snapshot) => {\n            const data = snapshot.val();\n            const tableBody = document.getElementById('records-table');\n            tableBody.innerHTML = ''; // Clear the table before updating\n            for (const id in data) {\n                const record = data[id];\n                const row = tableBody.insertRow();\n                row.insertCell(0).innerText = record.vozač;\n                row.insertCell(1).innerText = record.ulazak;\n                row.insertCell(2).innerText = record.izlazak;\n                row.insertCell(3).innerText = calculateHours(record.ulazak, record.izlazak);\n                row.insertCell(4).innerText = calculateDays(record.ulazak, record.izlazak);\n            }\n        });\n\n        function calculateHours(ulazak, izlazak) {\n            const entryTime = new Date(ulazak);\n            const exitTime = new Date(izlazak);\n            const hours = (exitTime - entryTime) / (1000 * 60 * 60); // Convert milliseconds to hours\n            return hours.toFixed(2);\n        }\n\n        function calculateDays(ulazak, izlazak) {\n            const entryTime = new Date(ulazak);\n            const exitTime = new Date(izlazak);\n            const days = Math.floor((exitTime - entryTime) / (1000 * 60 * 60 * 24)); // Convert milliseconds to days\n            return days;\n        }\n\n        function sortTable(colIndex) {\n            // Sorting functionality can be implemented here\n        }\n    </script>\n</body>\n</html>\n
